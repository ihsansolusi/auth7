name: core7-devroot

services:
  # ──────────────────────────────────────────────
  # Infrastructure
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: core7-postgres
    environment:
      POSTGRES_USER: core7
      POSTGRES_PASSWORD: core7-dev-password
      POSTGRES_DB: core7
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init.sh
    networks:
      - core7-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U core7"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: core7-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - core7-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: core7-nats
    command: >
      --jetstream
      --store_dir /data/jetstream
      --http_port 8222
      --port 4222
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    networks:
      - core7-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: core7-mailpit
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
    ports:
      - "1025:1025"
      - "8025:8025"
    volumes:
      - mailpit-data:/data
    networks:
      - core7-net

  # ──────────────────────────────────────────────
  # Core7 Services
  # ──────────────────────────────────────────────
  auth7:
    build:
      context: ./supported-apps/auth7
      dockerfile: Dockerfile
    container_name: core7-auth7
    environment:
      DATABASE_URL: "postgres://core7:core7-dev-password@postgres:5432/auth7?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      NATS_URL: "nats://nats:4222"
      JWT_ISSUER: "https://auth7.bank.co.id"
      JWT_AUDIENCE: "core7-services"
      SMTP_HOST: "mailpit"
      SMTP_PORT: "1025"
      SMTP_FROM: "auth7 <noreply@bank.co.id>"
      SMTP_STARTTLS: "false"
      LOG_LEVEL: "debug"
      ENVIRONMENT: "development"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - core7-net
    command: ["sh", "-c", "auth7 migrate up && auth7 start"]

  workflow7:
    build:
      context: ./supported-apps/workflow7
      dockerfile: Dockerfile
    container_name: core7-workflow7
    environment:
      DATABASE_URL: "postgres://core7:core7-dev-password@postgres:5432/workflow7?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      NATS_URL: "nats://nats:4222"
      AUTH7_URL: "http://auth7:8081"
      POLICY7_URL: "http://policy7:8082"
      NOTIF7_URL: "http://notif7:8083"
      LOG_LEVEL: "debug"
      ENVIRONMENT: "development"
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      auth7:
        condition: service_started
    networks:
      - core7-net

  policy7:
    build:
      context: ./supported-apps/policy7
      dockerfile: Dockerfile
    container_name: core7-policy7
    environment:
      DATABASE_URL: "postgres://core7:core7-dev-password@postgres:5432/policy7?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      NATS_URL: "nats://nats:4222"
      LOG_LEVEL: "debug"
      ENVIRONMENT: "development"
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - core7-net

  notif7:
    build:
      context: ./supported-apps/notif7
      dockerfile: Dockerfile
    container_name: core7-notif7
    environment:
      DATABASE_URL: "postgres://core7:core7-dev-password@postgres:5432/notif7?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      NATS_URL: "nats://nats:4222"
      SMTP_HOST: "mailpit"
      SMTP_PORT: "1025"
      SMTP_FROM: "notif7 <noreply@bank.co.id>"
      SMTP_STARTTLS: "false"
      LOG_LEVEL: "debug"
      ENVIRONMENT: "development"
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - core7-net

  # ──────────────────────────────────────────────
  # Seed & Test Utilities
  # ──────────────────────────────────────────────
  seed:
    image: postgres:16-alpine
    container_name: core7-seed
    volumes:
      - ./scripts/seed-data.sql:/seed-data.sql
    command: >
      sh -c "
        echo 'Waiting for postgres...' &&
        sleep 10 &&
        PGPASSWORD=core7-dev-password psql -h postgres -U core7 -d auth7 -f /seed-data.sql &&
        echo 'Seed data loaded successfully'
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - core7-net

volumes:
  postgres-data:
  redis-data:
  nats-data:
  mailpit-data:

networks:
  core7-net:
    driver: bridge
    name: core7-devroot_default
