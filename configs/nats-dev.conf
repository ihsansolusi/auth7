# NATS Server Configuration for Core7 Development
# Used by docker-compose.dev.yml

port: 4222
http_port: 8222

# JetStream for persistent messaging
jetstream {
  store_dir: "/data/jetstream"
  max_memory: 256MB
  max_file: 1GB
}

# Authorization for development
authorization {
  users: [
    { user: "core7", password: "core7-dev-password", permissions: { publish: ">", subscribe: ">" } }
  ]
  default_permissions: {
    publish: "core7.>"
    subscribe: "core7.>"
  }
}

# Logging
debug: false
trace: false
logtime: true

# Clustering (single node for dev)
cluster {
  port: 6222
}

# LeafNode connections (for future multi-cluster)
leafnode {
  port: 7422
}

# Gateway connections (for future multi-cluster)
gateway {
  port: 7222
  name: "core7-dev"
}
