# Auth7 Configuration
# Copy this to configs/config.yaml and adjust values

service:
  name: auth7
  profile: internal
  version: dev

server:
  port: 8081
  request_timeout: 30s
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s
  max_request_body_bytes: 1048576

database:
  primary:
    dsn: "${DATABASE_URL}"
    max_conns: 25
    min_conns: 5
    max_conn_lifetime: 1h
    max_conn_idle_time: 30m
    health_check_period: 1m
    connect_timeout: 10s
  replica:
    enabled: false
    dsn: "${DATABASE_REPLICA_URL}"

redis:
  dsn: "${REDIS_URL}"
  pool_size: 10
  min_idle_conns: 5
  max_retries: 3
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s
  keep_alive: 5m
  connect_timeout: 5s

token:
  type: jwt
  secret: "${JWT_SECRET}"
  duration: 15m

casbin:
  model_path: configs/casbin_model.conf
  policy_refresh_interval: 5m

security:
  cors:
    allowed_origins:
      - "http://localhost:3000"
      - "http://localhost:8081"
    allowed_methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed_headers:
      - Authorization
      - Content-Type
      - X-Request-ID
    max_age: 86400

rate_limit:
  enabled: true
  backend: redis
  per_ip:
    requests: 100
    window: 1m
  per_user:
    requests: 1000
    window: 1m

api:
  metrics:
    enabled: true
    path: /metrics
  diagnostics:
    enabled: true
    secret: "${DIAGNOSTIC_SECRET}"

otel:
  enabled: ${OTEL_ENABLED:-false}
  endpoint: ${OTEL_ENDPOINT:-localhost:4317}
  sampling_ratio: 0.1

logging:
  level: info
  pretty: true
  timezone: Asia/Jakarta

nats:
  enabled: ${NATS_ENABLED:-false}
  url: ${NATS_URL:-nats://localhost:4222}
  username: ""
  password: ""

external:
  grpc:
    address: ""
    timeout: 10s
